<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Sort Dropdown Sandbox</title>
  <style>
    @font-face {
      font-family: 'PolySans Trial';
      src: local('Helvetica Neue'), sans-serif;
    }
    
    body {
      font-family: 'PolySans Trial', -apple-system, sans-serif;
      padding: 100px;
      background: #fafafa;
      margin: 0;
    }

    /* Container to mock the top bar */
    .filter-bar-mock {
      display: flex;
      gap: 24px;
      align-items: center;
    }

    .filter-btn {
      font-family: inherit;
      font-size: 16px;
      font-weight: 500;
      color: #111;
      background: transparent;
      border: none;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 0;
    }

    .sort-trigger {
      color: #e03d2f; /* Using the red from the image/site */
    }

    .sort-container {
      position: relative;
      display: inline-block;
    }

    .sort-dropdown {
      position: absolute;
      top: calc(100% + 12px);
      left: 50%;
      transform: translateX(-50%);
      background: #f0f0f0; /* Soft grey from the image */
      border-radius: 20px;
      padding: 12px;
      width: 220px;
      box-shadow: 0 10px 40px rgba(0,0,0,0.08);
      display: flex;
      flex-direction: column;
      gap: 8px;
      opacity: 0;
      visibility: hidden;
      transition: opacity 0.2s ease, transform 0.2s ease, visibility 0.2s ease;
      transform-origin: top center;
      z-index: 100;
    }

    .sort-dropdown.open {
      opacity: 1;
      visibility: visible;
      transform: translateX(-50%) translateY(0);
    }

    .sort-option {
      width: 100%;
      font-family: inherit;
      font-size: 15px;
      font-weight: 500;
      padding: 12px 16px;
      border-radius: 9999px;
      border: none;
      background: #ffffff;
      color: #111;
      cursor: pointer;
      text-align: center;
      transition: all 0.2s ease;
    }

    .sort-option:hover, .sort-option:focus-visible {
      background: #e4e4e4;
      outline: none;
    }

    .sort-option.selected {
      background: #111111;
      color: #ffffff;
    }

    .sort-option.selected:hover {
      background: #000000;
    }

  </style>
</head>
<body>

  <div class="filter-bar-mock">
    <button class="filter-btn">
      Filters 
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 21v-7m0-4V3m8 18v-9m0-4V3m8 18v-5m0-4V3M1 14h6m2-6h6m2 8h6"/></svg>
    </button>
    
    <div class="sort-container">
      <button class="filter-btn sort-trigger" id="sortTrigger" aria-haspopup="listbox" aria-expanded="false">
        <span id="sortLabel">Recent first</span>
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M7 15l5 5 5-5M7 9l5-5 5 5"/></svg>
      </button>

      <div class="sort-dropdown" id="sortDropdown" role="listbox" tabindex="-1">
        <button class="sort-option selected" role="option" aria-selected="true" data-value="Most recent first">Most recent first</button>
        <button class="sort-option" role="option" aria-selected="false" data-value="Most popular first">Most popular first</button>
        <button class="sort-option" role="option" aria-selected="false" data-value="Alphabetical A-Z">Alphabetical A-Z</button>
        <button class="sort-option" role="option" aria-selected="false" data-value="Alphabetical Z-A">Alphabetical Z-A</button>
      </div>
    </div>
  </div>

  <script>
    const trigger = document.getElementById('sortTrigger');
    const label = document.getElementById('sortLabel');
    const dropdown = document.getElementById('sortDropdown');
    const options = Array.from(document.querySelectorAll('.sort-option'));
    
    let isOpen = false;
    let activeIndex = 0;

    function toggleDropdown() {
      isOpen = !isOpen;
      trigger.setAttribute('aria-expanded', isOpen);
      if (isOpen) {
        dropdown.classList.add('open');
        options[activeIndex].focus();
      } else {
        dropdown.classList.remove('open');
        trigger.focus();
      }
    }

    function selectOption(index) {
      activeIndex = index;
      options.forEach((opt, i) => {
        if (i === index) {
          opt.classList.add('selected');
          opt.setAttribute('aria-selected', 'true');
          label.textContent = opt.dataset.value;
        } else {
          opt.classList.remove('selected');
          opt.setAttribute('aria-selected', 'false');
        }
      });
      isOpen = false;
      dropdown.classList.remove('open');
      trigger.setAttribute('aria-expanded', 'false');
      trigger.focus();
    }

    trigger.addEventListener('click', (e) => {
      e.stopPropagation();
      toggleDropdown();
    });

    options.forEach((opt, index) => {
      opt.addEventListener('click', (e) => {
        e.stopPropagation();
        selectOption(index);
      });
      opt.addEventListener('keydown', (e) => {
        if (e.key === 'ArrowDown') {
          e.preventDefault();
          const next = (index + 1) % options.length;
          options[next].focus();
        } else if (e.key === 'ArrowUp') {
          e.preventDefault();
          const prev = (index - 1 + options.length) % options.length;
          options[prev].focus();
        } else if (e.key === 'Escape') {
          e.preventDefault();
          toggleDropdown();
        } else if (e.key === 'Enter' || e.key === ' ') {
          e.preventDefault();
          selectOption(index);
        }
      });
    });

    document.addEventListener('click', (e) => {
      if (isOpen && !dropdown.contains(e.target) && e.target !== trigger) {
        toggleDropdown();
      }
    });

    trigger.addEventListener('keydown', (e) => {
      if (e.key === 'ArrowDown' || e.key === 'Enter' || e.key === ' ') {
        e.preventDefault();
        if (!isOpen) toggleDropdown();
      } else if (e.key === 'Escape' && isOpen) {
        toggleDropdown();
      }
    });
  </script>

</body>
</html>
